# Xilinx AXI Ethernet (MRMAC binds to this driver) + MCDMA datapath.
# axienet (XILINX_AXI_EMAC) ioremaps the MCDMA itself (AXIENET_HAS_MCDMA) but
# Kconfig-depends on XILINX_DMA, so the standalone xilinx_dma dmaengine driver
# is necessarily built in and can't be turned off here. To stop it from
# claiming the MCDMA region first (which makes axienet's probe fail -EBUSY),
# the MCDMA node's compatible is overridden in port-config.dtsi to a string
# xilinx_dma doesn't match.
CONFIG_NET_VENDOR_XILINX=y
CONFIG_XILINX_AXI_EMAC=y
CONFIG_AXIENET_HAS_MCDMA=y
# AXI GPIO (QSFP sideband) and AXI IIC (Si5328 + QSFP module, direct buses)
CONFIG_GPIO_XILINX=y
CONFIG_I2C_XILINX=y
